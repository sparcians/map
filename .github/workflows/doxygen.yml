# Documentation Workflow for Github Actions
# Builds both the Doxygen API reference and the Sparta book,
# deploying them together to GitHub Pages:
#   https://sparcians.github.io/map/          <- Doxygen API reference
#   https://sparcians.github.io/map/sparta_book/ <- Sparta book

name: Documentation

on:
  push:
    branches:
      - map_v2.2
      - knutel/sparta-book

permissions:
  contents: write   # peaceiris/actions-gh-pages needs write access

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for gh-pages orphan push

      # ── 2. Build Doxygen API reference ───────────────────────────────────────
      - name: Build Doxygen documentation
        uses: mattnotmitt/doxygen-action@v1
        with:
          working-directory: 'sparta/doc'
          doxyfile-path: './Doxyfile'

      # ── 3. Install Java + Graphviz (PlantUML dependencies) ───────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      # ── 4. Install Asciidoctor + asciidoctor-diagram ─────────────────────────
      - name: Install Asciidoctor
        run: |
          sudo gem install asciidoctor
          sudo gem install asciidoctor-diagram-plantuml
          sudo gem install asciidoctor-multipage

      # ── 5. Download PlantUML jar ──────────────────────────────────────────────
      - name: Download PlantUML
        run: |
          mkdir -p $HOME/plantuml
          curl -sSL https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar \
               -o $HOME/plantuml/plantuml.jar
          echo "PLANTUML_JAR=$HOME/plantuml/plantuml.jar" >> $GITHUB_ENV

      # ── 6. Build the Sparta book ──────────────────────────────────────────────
      - name: Build Sparta book
        working-directory: sparta/doc/sparta_book
        run: |
          make html

      # ── 7. Merge outputs: Doxygen at root, book in sparta_book/ subdir ────────
      - name: Merge into single deploy directory
        run: |
          mkdir -p _deploy/sparta_book
          # Doxygen output goes to the root
          cp -r sparta/doc/html/. _deploy/
          # Book output goes into the sparta_book/ subdirectory
          cp -r sparta/doc/sparta_book/build/html _deploy/sparta_book/

      # ── 8. Deploy to gh-pages branch ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
          force_orphan: true
          commit_message: '[ci skip] ${{ github.event.head_commit.message }}'
