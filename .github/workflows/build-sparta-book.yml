# Generated by Claude
name: Build and Publish Sparta Book

on:
  push:
    branches:
      - knutel/sparta-book   # adjust to your working branch
    paths:
      - 'sparta/doc/sparta_book/**'
  workflow_dispatch:          # allow manual trigger from GitHub UI

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: knutel/sparta-book   # adjust to your working branch

      # ── 2. Install Java (required by PlantUML) ─────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 3. Install Graphviz (required by PlantUML for most diagram types) ──
      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      # ── 4. Install Asciidoctor + asciidoctor-diagram (PlantUML support) ────
      - name: Install Asciidoctor
        run: |
          gem install asciidoctor
          gem install asciidoctor-diagram   # pulls in PlantUML rendering

      # ── 5. Download PlantUML jar (asciidoctor-diagram uses it) ─────────────
      - name: Download PlantUML
        run: |
          mkdir -p $HOME/plantuml
          curl -sSL https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar \
               -o $HOME/plantuml/plantuml.jar
          echo "PLANTUML_JAR=$HOME/plantuml/plantuml.jar" >> $GITHUB_ENV

      # ── 6. Build the book ──────────────────────────────────────────────────
      - name: Build HTML book
        working-directory: sparta/doc/sparta_book
        run: |
          mkdir -p _site
          asciidoctor \
            --require asciidoctor-diagram \
            -a data-uri \
            -a toc=left \
            -a toclevels=3 \
            -a source-highlighter=rouge \
            -a rouge-style=github \
            -a imagesdir=images \
            -D _site \
            sparta_book.adoc
          # Copy images into output (referenced SVGs, PNGs, etc.)
          if [ -d images ]; then
            cp -r images _site/images
          fi

      # ── 7. Upload Pages artifact ───────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sparta/doc/sparta_book/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
